<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3D梦幻照片墙 - 视频景深版</title>

    <!-- 引入 MediaPipe 手势识别 AI 库 -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

    <style>
        :root {
            --bg-color-start: #11051c;
            --bg-color-end: #2a0845;
            --text-glow: #ff9a9e;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
        }

        body {
            background: radial-gradient(circle at center, var(--bg-color-end) 0%, var(--bg-color-start) 100%);
            color: #fff;
            font-family: 'Times New Roman', 'Microsoft YaHei', serif;
            overflow: hidden;
            touch-action: none;
            height: 100vh;
            width: 100vw;
        }

        #particle-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        .center-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 5;
            text-align: center;
            pointer-events: none;
            width: 100%;
            transition: transform 0.1s ease-out, opacity 0.1s ease-out; /* 响应音乐节拍 */
        }

        .center-text h1 {
            font-size: 2.5rem;
            font-weight: 400;
            letter-spacing: 4px;
            margin-bottom: 15px;
            color: #fff;
            text-shadow: 0 0 10px rgba(255, 154, 158, 0.8), 0 0 20px rgba(255, 154, 158, 0.4);
            font-style: italic;
        }

        .center-text p {
            font-size: 1.8rem;
            letter-spacing: 2px;
            color: #fceabb;
            text-shadow: 0 0 10px rgba(252, 234, 187, 0.6);
        }

        #scene {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            perspective: 1200px;
            z-index: 2;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #wrapper {
            position: relative;
            width: 0;
            height: 0;
            transform-style: preserve-3d;
            transform: translateZ(-600px) rotateX(0deg) rotateY(0deg);
        }

        .card {
            position: absolute;
            width: 160px;
            height: 220px;
            left: -80px;
            top: -110px;
            transform-style: preserve-3d;
            transition: transform 1.2s cubic-bezier(0.25, 1, 0.5, 1);
            cursor: pointer;
        }

        .card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 8px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4), inset 0 0 15px rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            display: flex;
            flex-direction: column;
            backface-visibility: visible; 
            transition: opacity 0.4s ease, transform 0.4s ease, box-shadow 0.3s ease, border-color 0.3s ease;
            will-change: transform, filter; 
        }

        .card:hover .card-inner {
            box-shadow: 0 0 25px rgba(255, 154, 158, 0.6), inset 0 0 20px rgba(255, 255, 255, 0.2);
            border-color: rgba(255, 154, 158, 0.5);
        }

        /* 兼容图片与视频的统一媒体样式 */
        .card-media {
            width: 100%;
            flex-grow: 1;
            border-radius: 8px;
            object-fit: cover;
            background-color: #222;
            pointer-events: none;
        }

        .card-title {
            text-align: center;
            font-size: 10px;
            color: #ddd;
            margin-top: 8px;
            font-family: sans-serif;
            letter-spacing: 1px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            pointer-events: none;
        }

        /* ------------------ UI 控制栏 ------------------ */
        #controls {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 20;
            display: flex;
            gap: 15px;
            background: rgba(0, 0, 0, 0.5);
            padding: 10px 20px;
            border-radius: 30px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .btn {
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 99%, #fecfef 100%);
            color: #333;
            border: none;
            padding: 10px 20px;
            border-radius: 20px;
            font-weight: bold;
            cursor: pointer;
            font-size: 14px;
            transition: transform 0.2s, opacity 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn:hover { transform: scale(1.05); opacity: 0.9; }
        .btn:active { transform: scale(0.95); }
        input[type="file"] { display: none; }
        
        #hint {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.7);
            font-size: 14px;
            z-index: 10;
            pointer-events: none;
            letter-spacing: 2px;
            text-align: center;
            background: rgba(0,0,0,0.3);
            padding: 8px 15px;
            border-radius: 20px;
        }

        #shape-controls {
            position: fixed;
            top: 95px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 20;
            display: flex;
            gap: 10px;
        }

        .shape-btn {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 6px 15px;
            border-radius: 15px;
            cursor: pointer;
            font-size: 13px;
            backdrop-filter: blur(5px);
            transition: all 0.3s cubic-bezier(0.25, 1, 0.5, 1);
        }

        .shape-btn:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: translateY(-2px);
        }
        
        .shape-btn.active {
            background: rgba(255, 154, 158, 0.6);
            border-color: rgba(255, 154, 158, 1);
            box-shadow: 0 0 15px rgba(255, 154, 158, 0.5);
            font-weight: bold;
            transform: scale(1.05);
        }

        #gesture-toast {
            position: fixed;
            top: 150px;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(135deg, rgba(255, 154, 158, 0.9), rgba(161, 140, 209, 0.9));
            color: white;
            padding: 8px 20px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 13px;
            opacity: 0;
            transition: opacity 0.5s ease, transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 100;
            pointer-events: none;
            backdrop-filter: blur(5px);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
        }

        #gesture-toast.show { opacity: 1; transform: translateX(-50%) scale(1.1); }

        #audio-controls {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 20;
            display: flex;
            flex-direction: column;
            gap: 10px;
            background: rgba(0, 0, 0, 0.3);
            padding: 15px;
            border-radius: 20px;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* ⭐ 修复：让摄像头窗口可视化，方便对准手势 ⭐ */
        #camera-preview-container { 
            position: fixed; 
            bottom: 20px; 
            right: 20px; 
            width: 140px; 
            height: 105px; 
            border-radius: 12px;
            border: 2px solid rgba(255, 154, 158, 0.5);
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            opacity: 0.85; 
            pointer-events: none; 
            z-index: 100; 
            overflow: hidden; 
            background: #000;
            display: none; /* 隐藏视频框 */
        }
        #camera-video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
        
        /* 加载动画 */
        #loading-spinner {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 1000;
            display: none; /* 默认隐藏 */
        }
        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top: 4px solid #ff9a9e;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <canvas id="particle-canvas"></canvas>

    <div class="center-text">
        <h1>所有的偶然</h1>
        <p>都是命中注定的必然</p>
    </div>

    <div id="scene">
        <div id="wrapper">
            <!-- 卡片动态生成 -->
        </div>
    </div>

    <div id="audio-controls">
        <button class="btn" id="mic-sync-btn" style="background: linear-gradient(135deg, #a18cd1 0%, #fbc2eb 100%);">🎤 开启麦克风律动</button>
    </div>

    <div id="hint">
        👆 拖拽旋转 / 滚轮缩放<br>
        <span id="gesture-hint" style="color: #ff9a9e; font-size: 12px; margin-top: 5px; display: inline-block;">
            ⏳ 正在加载AI手势模型并请求摄像头权限...
        </span>
    </div>

    <div id="shape-controls">
        <button class="shape-btn active" data-shape="floating">漂浮</button>
        <button class="shape-btn" data-shape="helix">螺旋</button>
        <button class="shape-btn" data-shape="sphere">球体</button>
        <button class="shape-btn" data-shape="grid">墙面</button>
        <button class="shape-btn" data-shape="heart">心形</button>
    </div>

    <div id="gesture-toast"></div>
    <!-- 摄像头预览小窗 -->
    <div id="camera-preview-container"><video id="camera-video" playsinline></video></div>
    
    <!-- 加载动画 -->
    <div id="loading-spinner">
        <div class="spinner"></div>
    </div>

    <div id="controls">
        <button class="btn" onclick="document.getElementById('upload-btn').click()">
            批量上传 照片/视频
        </button>
        <input type="file" id="upload-btn" multiple accept="image/*,video/*" style="display: none;">
        <button class="btn" id="auto-rotate-btn" style="background: rgba(255,255,255,0.2); color: white;">暂停自转</button>
    </div>

    <script>
        // ==========================================
        // ⭐ Web Audio API 视听联动逻辑
        // ==========================================
        let audioCtx, analyser, audioSource, audioDataArray;
        let isMicSyncing = false;
        let smoothedBeat = 0; 
        const micSyncBtn = document.getElementById('mic-sync-btn');

        async function initMicAudio() {
            if (audioCtx && audioCtx.state === 'running') return;
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                if (!audioCtx) audioCtx = new AudioContext();
                if (audioCtx.state === 'suspended') await audioCtx.resume();

                if (!analyser) {
                    analyser = audioCtx.createAnalyser();
                    analyser.fftSize = 256;
                    audioSource = audioCtx.createMediaStreamSource(stream);
                    audioSource.connect(analyser);
                    audioDataArray = new Uint8Array(analyser.frequencyBinCount);
                }
                isMicSyncing = true;
                micSyncBtn.innerText = "🛑 关闭麦克风律动";
                micSyncBtn.style.background = "rgba(255, 255, 255, 0.2)";
            } catch (err) {
                console.error("获取麦克风失败:", err);
                alert("需要允许麦克风权限，才能让照片墙‘听见’你播放的音乐哦！");
            }
        }

        micSyncBtn.addEventListener('click', () => {
            if (!isMicSyncing) {
                initMicAudio();
            } else {
                if (audioCtx) audioCtx.suspend(); 
                isMicSyncing = false;
                micSyncBtn.innerText = "🎤 开启麦克风律动";
                micSyncBtn.style.background = "linear-gradient(135deg, #a18cd1 0%, #fbc2eb 100%)";
            }
        });


        // ==========================================
        // 1. 3D 基础环境与形变逻辑
        // ==========================================
        const wrapper = document.getElementById('wrapper');
        const numCards = 45;
        const radius = 600;
        let cards = [];
        let currentShape = 'floating'; 

        function generatePlaceholder(index) {
            const hue = (index * 137.5) % 360;
            return `data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="160" height="220"><rect width="160" height="220" fill="hsl(${hue}, 40%, 30%)"/><text x="50%" y="50%" fill="rgba(255,255,255,0.3)" font-family="sans-serif" font-size="20" text-anchor="middle" dominant-baseline="middle">Media ${index + 1}</text></svg>`;
        }

        const labels = ["猫耳幻想", "夜色", "初雪", "指尖星点", "梦幻大眼", "比心", "微风", "甜", "所有的偶然", "发呆", "侧颜", "光影"];

        function createCards() {
            for (let i = 0; i < numCards; i++) {
                const card = document.createElement('div');
                card.className = 'card';
                card.dataset.index = i; 
                card.repel = { cx: 0, cy: 0, cz: 0, crx: 0, cry: 0 };
                
                const inner = document.createElement('div');
                inner.className = 'card-inner';

                const img = document.createElement('img');
                img.className = 'card-media'; 
                img.src = generatePlaceholder(i);
                
                const title = document.createElement('div');
                title.className = 'card-title';
                title.innerText = labels[Math.floor(Math.random() * labels.length)];
                
                inner.appendChild(img);
                inner.appendChild(title);
                card.appendChild(inner);
                
                wrapper.appendChild(card);
                cards.push(card);
            }
            applyShape(currentShape);
        }

        function updateShapeBtnUI(shapeType) {
            document.querySelectorAll('.shape-btn').forEach(b => b.classList.remove('active'));
            const targetBtn = document.querySelector(`.shape-btn[data-shape="${shapeType}"]`);
            if (targetBtn) targetBtn.classList.add('active');
        }

        function applyShape(shapeType) {
            currentShape = shapeType;
            updateShapeBtnUI(shapeType); 

            for (let i = 0; i < numCards; i++) {
                const card = cards[i];
                let transformStr = "";
                let bx = 0, by = 0, bz = 0;

                if (shapeType === 'floating') {
                    bx = (Math.random() - 0.5) * 1800; by = (Math.random() - 0.5) * 1800; bz = (Math.random() - 0.5) * 1800;
                    const rotX = Math.random() * 360; const rotY = Math.random() * 360; const rotZ = Math.random() * 360;
                    card.style.transition = 'transform 4s ease-in-out';
                    transformStr = `translate3d(${bx}px, ${by}px, ${bz}px) rotateX(${rotX}deg) rotateY(${rotY}deg) rotateZ(${rotZ}deg)`;
                } 
                else {
                    card.style.transition = 'transform 1.2s cubic-bezier(0.25, 1, 0.5, 1)';
                    if (shapeType === 'helix') {
                        const angle = (i / numCards) * Math.PI * 2 * 3; 
                        by = (i / numCards) * 800 - 400; 
                        bx = Math.sin(angle) * radius;
                        bz = Math.cos(angle) * radius;
                        transformStr = `rotateY(${angle}rad) translateZ(${radius}px) translateY(${by}px) rotateX(0deg) rotateZ(0deg)`;
                    } 
                    else if (shapeType === 'sphere') {
                        const phi = Math.acos(-1 + (2 * i) / numCards); const theta = Math.sqrt(numCards * Math.PI) * phi;
                        const r = radius * 0.9;
                        bx = r * Math.sin(phi) * Math.sin(theta);
                        by = r * Math.cos(phi);
                        bz = r * Math.sin(phi) * Math.cos(theta);
                        transformStr = `rotateY(${theta * 180 / Math.PI}deg) rotateX(${(phi * 180 / Math.PI) - 90}deg) translateZ(${r}px)`;
                    }
                    else if (shapeType === 'grid') {
                        const col = i % 9; const row = Math.floor(i / 9);
                        bx = -720 + col * 180; by = -480 + row * 240; bz = 0;
                        transformStr = `translate3d(${bx}px, ${by}px, 0px) rotateY(0deg) rotateX(0deg)`;
                    }
                    else if (shapeType === 'heart') {
                        const t = (i / numCards) * Math.PI * 2; const scale = 25; 
                        bx = 16 * Math.pow(Math.sin(t), 3) * scale;
                        by = -(13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t)) * scale;
                        bz = (Math.random() - 0.5) * 80;
                        transformStr = `translate3d(${bx}px, ${by}px, ${bz}px) rotateY(0deg) rotateX(0deg)`;
                    }
                }
                card.basePos = {x: bx, y: by, z: bz}; 
                card.style.transform = transformStr;
            }
        }

        createCards();

        setInterval(() => {
            if (currentShape === 'floating') applyShape('floating');
        }, 3800); 

        document.querySelectorAll('.shape-btn').forEach(btn => {
            btn.addEventListener('click', () => applyShape(btn.dataset.shape));
        });

        // ------------------ 状态变量 ------------------
        let targetRotX = -10, targetRotY = 0; 
        let currentRotX = -10, currentRotY = 0;
        let targetTranslateZ = -700, currentTranslateZ = -700;
        
        let autoRotate = true;
        let isDragging = false;
        let startX, startY;
        let currentMouseX = null, currentMouseY = null;

        // 修改手势全局变量
        let isHandControlling = false;
        let currentHandRepelX = null;
        let currentHandRepelY = null;
        let lastPointX = null; 
        let lastPointY = null; 
        let smoothedPalmSize = null;

        window.addEventListener('mousedown', (e) => {
            if(e.target.closest('#controls') || e.target.closest('#shape-controls') || e.target.closest('#audio-controls') || e.target.closest('.card')) return;
            isDragging = true; startX = e.clientX; startY = e.clientY;
        });
        window.addEventListener('mousemove', (e) => {
            currentMouseX = e.clientX; currentMouseY = e.clientY;
            if (!isDragging) return;
            targetRotY += (e.clientX - startX) * 0.3; targetRotX -= (e.clientY - startY) * 0.3;
            if (targetRotX > 45) targetRotX = 45; if (targetRotX < -45) targetRotX = -45;
            startX = e.clientX; startY = e.clientY;
        });
        window.addEventListener('mouseup', () => isDragging = false);
        window.addEventListener('mouseleave', () => { currentMouseX = null; currentMouseY = null; });
        window.addEventListener('wheel', (e) => {
            targetTranslateZ += e.deltaY * 1.5;
            if (targetTranslateZ > -200) targetTranslateZ = -200;
            if (targetTranslateZ < -2500) targetTranslateZ = -2500;
        });

        // ==========================================
        // ⭐ 渲染循环：处理 3D 旋转 & 原力排斥物理效果 & 景深模糊
        // ==========================================
        const centerTextNode = document.querySelector('.center-text');

        function animateScene() {
            if (analyser && isMicSyncing && audioCtx.state === 'running') {
                analyser.getByteFrequencyData(audioDataArray);
                let bassSum = 0;
                for(let i = 0; i < 12; i++) bassSum += audioDataArray[i]; 
                let currentBeat = (bassSum / 12) / 255; 
                currentBeat = Math.pow(currentBeat, 1.5) * 2.5; 
                if(currentBeat > 1.5) currentBeat = 1.5; 
                smoothedBeat = smoothedBeat * 0.7 + currentBeat * 0.3; 
            } else {
                smoothedBeat *= 0.9; 
            }

            let speedBoost = (smoothedBeat * 1.2);
            if (autoRotate && !isDragging && !isHandControlling) {
                targetRotY -= 0.15 + speedBoost; 
            }

            if (centerTextNode) {
                const textScale = 1 + (smoothedBeat * 0.4);
                const textOpacity = 0.5 + (smoothedBeat * 0.5);
                centerTextNode.style.transform = `translate(-50%, -50%) scale(${textScale})`;
                centerTextNode.style.opacity = textOpacity;
            }

            currentRotX += (targetRotX - currentRotX) * 0.08;
            currentRotY += (targetRotY - currentRotY) * 0.08;
            currentTranslateZ += (targetTranslateZ - currentTranslateZ) * 0.1;
            wrapper.style.transform = `translateZ(${currentTranslateZ}px) rotateX(${currentRotX}deg) rotateY(${currentRotY}deg)`;

            const radX = currentRotX * Math.PI / 180;
            const radY = currentRotY * Math.PI / 180;
            const cosX = Math.cos(radX), sinX = Math.sin(radX);
            const cosY = Math.cos(radY), sinY = Math.sin(radY);

            // 无论任何手势，手掌都在制造排斥场
            const forceX = isHandControlling ? currentHandRepelX : currentMouseX;
            const forceY = isHandControlling ? currentHandRepelY : currentMouseY;

            for(let i=0; i < numCards; i++) {
                const card = cards[i];
                const inner = card.firstChild; 
                
                if (card.basePos) {
                    let x1 = card.basePos.x * cosY + card.basePos.z * sinY;
                    let z1 = -card.basePos.x * sinY + card.basePos.z * cosY;
                    let y1 = card.basePos.y;
                    
                    let y2 = y1 * cosX - z1 * sinX;
                    let z2 = y1 * sinX + z1 * cosX; 

                    let blurAmount = 0;
                    if (z2 < -100) {
                        blurAmount = (-z2 - 100) / 150; 
                    }
                    blurAmount = Math.min(blurAmount, 8); 

                    let brightness = 1 + (z2 / 1000);
                    brightness = Math.max(0.3, Math.min(brightness, 1.2));

                    inner.style.filter = `blur(${blurAmount}px) brightness(${brightness})`;
                }

                let targetX = 0, targetY = 0, targetZ = 0, targetRx = 0, targetRy = 0;

                if (forceX !== null && forceY !== null) {
                    const rect = card.getBoundingClientRect();
                    const cx = rect.left + rect.width / 2; const cy = rect.top + rect.height / 2;
                    const dx = cx - forceX; const dy = cy - forceY;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    const repelRadius = 300; 
                    
                    if (dist < repelRadius && dist > 0) {
                        const force = Math.pow((repelRadius - dist) / repelRadius, 1.5); 
                        targetX = (dx / dist) * force * 150; targetY = (dy / dist) * force * 150;
                        targetZ = force * 200; targetRx = -(dy / dist) * force * 60; targetRy = (dx / dist) * force * 60;
                    }
                }

                card.repel.cx += (targetX - card.repel.cx) * 0.15; card.repel.cy += (targetY - card.repel.cy) * 0.15;
                card.repel.cz += (targetZ - card.repel.cz) * 0.15; card.repel.crx += (targetRx - card.repel.crx) * 0.15; card.repel.cry += (targetRy - card.repel.cry) * 0.15;

                if (Math.abs(card.repel.cx) > 0.5 || Math.abs(targetX) > 0) {
                    inner.style.transform = `translate3d(${card.repel.cx}px, ${card.repel.cy}px, ${card.repel.cz}px) rotateX(${card.repel.crx}deg) rotateY(${card.repel.cry}deg)`;
                } else if (card.repel.cx !== 0) {
                    card.repel = { cx: 0, cy: 0, cz: 0, crx: 0, cry: 0 }; inner.style.transform = 'none';
                }
            }

            requestAnimationFrame(animateScene);
        }
        animateScene();


        // ==========================================
        // 2. ⭐ AI 手势控制 (专属单指视控版) ⭐
        // ==========================================
        const videoElement = document.getElementById('camera-video');
        const gestureToast = document.getElementById('gesture-toast');
        const gestureHint = document.getElementById('gesture-hint');
        
        let currentDetectedGesture = null;
        let gestureHoldFrames = 0, noHandFrames = 0, toastTimeout = null;
        let camera = null;
        let handsAI = null;

        function showToast(message) {
            gestureToast.innerText = message; gestureToast.classList.add('show');
            if (toastTimeout) clearTimeout(toastTimeout);
            toastTimeout = setTimeout(() => { gestureToast.classList.remove('show'); }, 2000);
        }

        async function initHandTracking() {
            if (camera) return; // Prevent multiple initializations

            try {
                handsAI = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
                handsAI.setOptions({ maxNumHands: 2, modelComplexity: 0, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5 });
                handsAI.onResults(onHandResults);

                camera = new Camera(videoElement, {
                    onFrame: async () => await handsAI.send({image: videoElement}),
                    width: 320, height: 240
                });

                await camera.start();
                gestureHint.innerHTML = "🪄 ☝️单指控视角/缩放 | 形变：✋球 ✌️螺旋 ✊墙 🫶心";
                showToast("手势控制已开启，快来试试魔法！");
            } catch (error) {
                console.error(error); gestureHint.innerText = "❌ 手势启动失败，请检查摄像头权限";
            }
        }

        function onHandResults(results) {
            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                isHandControlling = true; noHandFrames = 0; 

                let targetShape = null; 
                let gestureMsg = ""; 
                let gestureDetected = false;
                let isPointing = false;

                // 1. 双手形状判定逻辑
                if (results.multiHandLandmarks.length >= 2) {
                    const h1 = results.multiHandLandmarks[0]; const h2 = results.multiHandLandmarks[1];
                    const thumbDist = Math.hypot(h1[4].x - h2[4].x, h1[4].y - h2[4].y);
                    const indexDist = Math.hypot(h1[8].x - h2[8].x, h1[8].y - h2[8].y);
                    if (thumbDist < 0.15 && indexDist < 0.15) { 
                        targetShape = 'heart'; gestureMsg = "🫶 检测到双手比心 · 组合为【心形】"; gestureDetected = true;
                    }
                }

                const landmarks = results.multiHandLandmarks[0];
                const palmCenter = landmarks[9]; 
                const wrist = landmarks[0];

                // 随时更新掌心位置，用于全局排斥场
                currentHandRepelX = (1 - palmCenter.x) * window.innerWidth;
                currentHandRepelY = palmCenter.y * window.innerHeight;

                // 2. 单手形状精准判定
                if (!gestureDetected) {
                    const indexOpen = Math.hypot(landmarks[8].x - wrist.x, landmarks[8].y - wrist.y) > Math.hypot(landmarks[6].x - wrist.x, landmarks[6].y - wrist.y);
                    const middleOpen = Math.hypot(landmarks[12].x - wrist.x, landmarks[12].y - wrist.y) > Math.hypot(landmarks[10].x - wrist.x, landmarks[10].y - wrist.y);
                    const ringOpen = Math.hypot(landmarks[16].x - wrist.x, landmarks[16].y - wrist.y) > Math.hypot(landmarks[14].x - wrist.x, landmarks[14].y - wrist.y);
                    const pinkyOpen = Math.hypot(landmarks[20].x - wrist.x, landmarks[20].y - wrist.y) > Math.hypot(landmarks[18].x - wrist.x, landmarks[18].y - wrist.y);

                    let openFingers = 0;
                    if (indexOpen) openFingers++;  
                    if (middleOpen) openFingers++; 
                    if (ringOpen) openFingers++; 
                    if (pinkyOpen) openFingers++; 

                    // ⭐ 新增：单根食指判定 ⭐
                    isPointing = indexOpen && !middleOpen && !ringOpen && !pinkyOpen;

                    if (isPointing) {
                        // 单指模式：不触发变形，专心给后文控制视角使用
                        targetShape = currentShape; 
                    }
                    else if (openFingers >= 4) { targetShape = 'sphere'; gestureMsg = "✋ 检测到张开手掌 · 组合为【球体】"; } 
                    else if (openFingers === 0) { targetShape = 'grid'; gestureMsg = "✊ 检测到握拳 · 组合为【墙面】"; } 
                    else if (openFingers === 2 && indexOpen && middleOpen) { targetShape = 'helix'; gestureMsg = "✌️ 检测到剪刀手 · 组合为【螺旋】"; }
                }

                // 3. 超强抗噪防抖切换逻辑
                if (targetShape) {
                    if (targetShape === currentDetectedGesture) {
                        gestureHoldFrames++;
                        if (gestureHoldFrames === 8) { 
                            if (currentShape !== targetShape) {
                                applyShape(targetShape); 
                                showToast(gestureMsg);
                            }
                        }
                    } else { 
                        currentDetectedGesture = targetShape; 
                        gestureHoldFrames = 1; 
                    }
                } else {
                    if (gestureHoldFrames > 0) gestureHoldFrames--;
                    else currentDetectedGesture = null;
                }

                // 4. ⭐ 视角控制：一根食指专享 ⭐
                const rawPalmSize = Math.hypot(landmarks[0].x - landmarks[9].x, landmarks[0].y - landmarks[9].y);
                smoothedPalmSize = smoothedPalmSize === null ? rawPalmSize : smoothedPalmSize * 0.7 + rawPalmSize * 0.3; 

                if (isPointing) {
                    const indexScreenX = (1 - landmarks[8].x) * window.innerWidth;
                    const indexScreenY = landmarks[8].y * window.innerHeight;

                    if (lastPointX !== null && lastPointY !== null && window.lastPalmSize !== null) {
                        const deltaX = indexScreenX - lastPointX;
                        const deltaY = indexScreenY - lastPointY;
                        const deltaSize = smoothedPalmSize - window.lastPalmSize;

                        // 旋转控制 (大幅提高灵敏度，与鼠标保持一致)
                        if (Math.abs(deltaX) > 2 || Math.abs(deltaY) > 2) {
                            targetRotY += deltaX * 0.3; 
                            targetRotX -= deltaY * 0.3;
                            if (targetRotX > 45) targetRotX = 45; if (targetRotX < -45) targetRotX = -45;
                        }
                        // 缩放控制
                        if (Math.abs(deltaSize) > 0.001) {
                            targetTranslateZ += deltaSize * 35000; 
                            if (targetTranslateZ > -150) targetTranslateZ = -150;
                            if (targetTranslateZ < -2500) targetTranslateZ = -2500;
                        }
                    }
                    lastPointX = indexScreenX; 
                    lastPointY = indexScreenY;
                } else {
                    // 如果不是一根手指，清空上一帧记录，防止切回时镜头跳跃
                    lastPointX = null; 
                    lastPointY = null;
                }
                window.lastPalmSize = smoothedPalmSize;

            } else {
                isHandControlling = false;  
                currentHandRepelX = null; currentHandRepelY = null;
                lastPointX = null; lastPointY = null; 
                window.lastPalmSize = null; smoothedPalmSize = null;
                
                if (gestureHoldFrames > 0) gestureHoldFrames--;
                else currentDetectedGesture = null;

                noHandFrames++;
                if (noHandFrames === 45 && currentShape !== 'floating') { 
                    applyShape('floating'); showToast("🌌 未检测到手势 · 照片自由漂浮");
                }
            }
        }

        initHandTracking();

        // ==========================================
        // 3. ⭐ 图片/视频混合上传保护机制 & 全局星网特效 ⭐
        // ==========================================
        const uploadBtn = document.getElementById('upload-btn');
        const loadingSpinner = document.getElementById('loading-spinner');

        uploadBtn.addEventListener('change', async (e) => {
            const files = Array.from(e.target.files);
            if (files.length === 0) return;
            
            // 显示加载动画
            loadingSpinner.style.display = 'block';

            try {
                // ⭐ 内存保护机制：最多只允许 3 个真实视频元素播放 ⭐
                let activeVideoCount = 0;
                const MAX_VIDEOS = 3; 

                for (let i = 0; i < numCards; i++) {
                    const file = files[i % files.length];
                    const url = URL.createObjectURL(file);
                    
                    const cardInner = cards[i].firstChild;
                    const oldMedia = cardInner.querySelector('.card-media');
                    if (oldMedia) {
                        // 如果是旧视频，释放其内存
                        if(oldMedia.tagName === 'VIDEO') {
                            oldMedia.pause();
                            oldMedia.removeAttribute('src');
                            oldMedia.load();
                        }
                        oldMedia.remove();
                    }
                    
                    let newMedia;
                    if (file.type.startsWith('video/')) {
                        if (activeVideoCount < MAX_VIDEOS) {
                            newMedia = document.createElement('video');
                            newMedia.autoplay = true;
                            newMedia.loop = true;
                            newMedia.muted = true;
                            newMedia.playsInline = true;
                            newMedia.src = url;
                            activeVideoCount++;
                        } else {
                            // 超过 3 个配额后，视频文件将被回退显示为彩色占位图，防止浏览器崩溃白屏
                            newMedia = document.createElement('img');
                            newMedia.src = generatePlaceholder(i); 
                        }
                    } else {
                        newMedia = document.createElement('img');
                        newMedia.src = url;
                    }
                    
                    newMedia.className = 'card-media';
                    cardInner.insertBefore(newMedia, cardInner.firstChild);
                }
            } catch (error) {
                console.error("Error loading media:", error);
                alert("加载媒体文件时出错，请重试。");
            } finally {
                // 隐藏加载动画
                loadingSpinner.style.display = 'none';
                e.target.value = '';
            }
        });

        const autoRotateBtn = document.getElementById('auto-rotate-btn');
        autoRotateBtn.addEventListener('click', () => {
            autoRotate = !autoRotate;
            autoRotateBtn.innerText = autoRotate ? "暂停自转" : "开启自转";
            autoRotateBtn.style.background = autoRotate ? "rgba(255,255,255,0.2)" : "rgba(255,255,255,0.4)";
        });

        const canvas = document.getElementById('particle-canvas');
        const ctx = canvas.getContext('2d');
        let width, height;
        function resizeCanvas() { width = canvas.width = window.innerWidth; height = canvas.height = window.innerHeight; }
        window.addEventListener('resize', resizeCanvas); resizeCanvas();

        const particles = [];
        class BgParticle {
            constructor() { this.reset(); this.x = Math.random() * width; this.y = Math.random() * height; }
            reset() {
                this.x = Math.random() * width; 
                this.y = height + 10;
                this.size = Math.random() * 2 + 0.5;
                this.speedY = -(Math.random() * 1 + 0.5); 
                this.speedX = Math.random() * 1 - 0.5;
                this.alpha = Math.random() * 0.5 + 0.2;
                this.color = Math.random() > 0.5 ? '#ff9a9e' : '#a18cd1';
            }
            update() {
                this.y += this.speedY; this.x += this.speedX; 
                this.x += Math.sin(this.y * 0.01) * 0.5;
                if (this.y < -10 || this.x < -10 || this.x > width + 10) { this.reset(); }
            }
            draw(beat) {
                ctx.beginPath(); 
                let currentSize = this.size + (beat * 5);
                ctx.arc(this.x, this.y, currentSize, 0, Math.PI * 2);
                ctx.fillStyle = this.color; 
                ctx.globalAlpha = this.alpha;
                ctx.shadowBlur = 10 + (beat * 30); 
                ctx.shadowColor = this.color; 
                ctx.fill();
                ctx.globalAlpha = 1; 
            }
        }
        for (let i = 0; i < 120; i++) { particles.push(new BgParticle()); } 
        
        function drawParticles() {
            ctx.clearRect(0, 0, width, height);

            for (let i = 0; i < particles.length; i++) { 
                particles[i].update(); 
                particles[i].draw(smoothedBeat); 
            }

            ctx.lineWidth = 0.4;
            ctx.strokeStyle = `rgba(255, 154, 158, ${0.15 + smoothedBeat*0.3})`;
            let connectDist = 100 + (smoothedBeat * 50); 

            for (let i = 0; i < particles.length; i++) {
                for (let j = i + 1; j < particles.length; j++) {
                    let dx = particles[i].x - particles[j].x;
                    let dy = particles[i].y - particles[j].y;
                    let dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < connectDist) {
                        ctx.beginPath();
                        ctx.moveTo(particles[i].x, particles[i].y);
                        ctx.lineTo(particles[j].x, particles[j].y);
                        ctx.stroke();
                    }
                }
            }

            requestAnimationFrame(drawParticles);
        }
        drawParticles();

    </script>
</body>
</html>
